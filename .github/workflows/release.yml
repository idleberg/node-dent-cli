name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-windows-x64-modern
            platform: win32
          - target: bun-linux-x64-modern
            platform: linux
          - target: bun-darwin-arm64
            platform: darwin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build executable
        run: |
          bun install
          bun build src/main.ts --compile --target=${{ matrix.target }} --outfile dent

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create zip
        run: zip "deno-cli-${{ steps.version.outputs.VERSION }}-${{ matrix.platform }}.zip" dent${{ matrix.platform == 'win32' && '.exe' || '' }} LICENSE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deno-cli-${{ matrix.platform }}
          path: deno-cli-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: deno-cli-*.zip
